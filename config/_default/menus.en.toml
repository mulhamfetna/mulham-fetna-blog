# Six audience lanes. Each top-level item serves one visitor type.
# See docs/superpowers/specs/2026-07-13-website-refactor-design.md §4.1
#
# Renaming a content section breaks these pageRefs — update both in lockstep and
# add an `aliases` entry to the moved page.
#
# "Home" is intentionally omitted: the site logo links to / already, and a Home
# item would spend one of six slots on a route every visitor knows.

