    pageRef = "Roadmaps"
    parent = "Learn"
    weight = 3

  [[main]]
    name = "Tutorials"
    pageRef = "Tutorials-Guides"
    parent = "Learn"
    weight = 4

# Mentorship is its OWN lane, not a child of Ventures. Individuals buying 1:1 time
# are a different audience and a different transaction from organizations
# sponsoring a venture — burying it under Ventures hid the most important
# individual-facing section on the site.
[[main]]
